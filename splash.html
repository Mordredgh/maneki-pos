<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── PALETA MANEKI PREMIUM ── */
  --cream:#FBF8F3;--gold:#C9933A;--gold-lt:#F5DFA8;--gold-bg:#FDF6E3;
  --ink:#2A1A0E;--ink2:#5C3D1E;--ink3:#9B7B5A;
  --lila:#C4A8E0;--lila-dk:#9B7BC4;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
}
html,body{width:100vw;height:100vh;overflow:hidden}
body{
  font-family:'Outfit',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  /* LIGHT: crema cálido */
  background:
    radial-gradient(ellipse 900px 600px at 20% 25%,rgba(201,147,58,.10) 0%,transparent 65%),
    radial-gradient(ellipse 700px 500px at 80% 70%,rgba(196,168,224,.12) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 55% 10%,rgba(245,223,168,.10) 0%,transparent 55%),
    linear-gradient(160deg,#FBF8F3 0%,#FDF6E3 40%,#F7F3FD 70%,#FBF8F3 100%);
  transition:background .5s ease;
  user-select:none;
}
/* DARK */
body.dark{
  background:
    radial-gradient(ellipse 900px 600px at 20% 25%,rgba(201,147,58,.08) 0%,transparent 65%),
    radial-gradient(ellipse 700px 500px at 80% 70%,rgba(196,168,224,.06) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 55% 10%,rgba(201,147,58,.05) 0%,transparent 55%),
    linear-gradient(160deg,#1C120A 0%,#231709 40%,#1E1208 70%,#1C120A 100%) !important;
}

/* MESH BACKGROUND */
.bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 900px 600px at 20% 25%,rgba(201,147,58,.08) 0%,transparent 65%),
    radial-gradient(ellipse 700px 500px at 80% 70%,rgba(196,168,224,.10) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 55% 10%,rgba(245,223,168,.07) 0%,transparent 55%);
  animation:bgPulse 10s ease-in-out infinite alternate;
}
body.dark .bg{
  background:
    radial-gradient(ellipse 900px 600px at 20% 25%,rgba(201,147,58,.06) 0%,transparent 65%),
    radial-gradient(ellipse 700px 500px at 80% 70%,rgba(196,168,224,.05) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 55% 10%,rgba(201,147,58,.04) 0%,transparent 55%);
}
@keyframes bgPulse{
  0%{filter:brightness(1)}
  100%{filter:brightness(1.05)}
}

/* GRAIN */
.grain{
  position:fixed;inset:-8px;z-index:1;pointer-events:none;opacity:.042;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
  animation:grain .35s steps(1) infinite;
}
@keyframes grain{
  0%  {background-position:0px 0px}
  14% {background-position:-18px 12px}
  28% {background-position:12px -18px}
  42% {background-position:-12px 18px}
  57% {background-position:18px -12px}
  71% {background-position:-8px 8px}
  85% {background-position:8px -8px}
  100%{background-position:0px 0px}
}

/* PARTICLES */
.particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.pt{
  position:absolute;border-radius:50%;opacity:0;
  animation:ptFloat var(--d) ease-in-out infinite var(--dl), ptShow .8s var(--dl) ease forwards;
}
@keyframes ptFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(var(--tx),var(--ty)) scale(var(--sc))}
}
@keyframes ptShow{to{opacity:var(--op)}}

/* CONTENT */
.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center}

/* LOGO SCENE */
.logo-scene{
  position:relative;width:196px;height:196px;
  margin-bottom:2.8rem;
  animation:logoIn .9s var(--spring) .1s both;
}
@keyframes logoIn{
  from{opacity:0;transform:scale(.25) rotate(-12deg) translateY(40px)}
  to{opacity:1;transform:scale(1) rotate(0deg) translateY(0)}
}

/* Anillo cónico girando */
.ring{
  position:absolute;border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(var(--cream),var(--cream)) padding-box,
             conic-gradient(from 0deg,transparent 0%,rgba(201,147,58,.75) 18%,rgba(255,255,255,.35) 25%,transparent 40%,rgba(196,168,224,.55) 60%,rgba(255,255,255,.25) 67%,transparent 80%,rgba(201,147,58,.55) 100%) border-box;
  animation:spin 5s linear infinite;
}
body.dark .ring{
  background:linear-gradient(#1E1208,#1E1208) padding-box,
             conic-gradient(from 0deg,transparent 0%,rgba(232,184,75,.75) 18%,rgba(255,255,255,.30) 25%,transparent 40%,rgba(196,168,224,.50) 60%,rgba(255,255,255,.20) 67%,transparent 80%,rgba(232,184,75,.55) 100%) border-box;
}
.ring.r1{inset:-18px}
.ring.r2{inset:-32px;animation-duration:9s;animation-direction:reverse;opacity:.5}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pulso interior */
.pulse{
  position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(201,147,58,.25);
  animation:pul 2.5s ease-in-out infinite;
}
@keyframes pul{
  0%,100%{transform:scale(1);opacity:.3;border-color:rgba(201,147,58,.18)}
  50%{transform:scale(1.05);opacity:.9;border-color:rgba(201,147,58,.6)}
}

/* Glow detrás */
.glow{
  position:absolute;inset:-50px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,147,58,.25) 0%,rgba(196,168,224,.10) 45%,transparent 70%);
  filter:blur(18px);
  animation:glowBreath 4s ease-in-out infinite;
}
body.dark .glow{
  background:radial-gradient(circle,rgba(201,147,58,.20) 0%,rgba(196,168,224,.08) 45%,transparent 70%);
}
@keyframes glowBreath{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.15);opacity:1}
}

/* Caja blanca del logo */
.logo-box{
  position:relative;width:196px;height:196px;border-radius:52px;
  background:linear-gradient(145deg,#fff 0%,#FBF8F3 60%,#FDF6E3 100%);
  box-shadow:
    0 0 0 1px rgba(201,147,58,.28),
    0 0 0 3px rgba(255,255,255,.08),
    0 50px 120px rgba(42,26,14,.25),
    0 20px 50px rgba(201,147,58,.15),
    0 6px 16px rgba(42,26,14,.12),
    inset 0 2px 0 #fff,
    inset 0 -1px 0 rgba(201,147,58,.18),
    inset 1px 0 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
body.dark .logo-box{
  background:linear-gradient(145deg,rgba(42,28,12,.98) 0%,rgba(30,18,8,.99) 100%);
  box-shadow:
    0 0 0 1px rgba(201,147,58,.28),
    0 0 0 3px rgba(255,255,255,.04),
    0 50px 120px rgba(0,0,0,.60),
    0 20px 50px rgba(201,147,58,.10),
    0 6px 16px rgba(0,0,0,.40),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -1px 0 rgba(201,147,58,.15);
}
.logo-box img{width:78%;height:78%;object-fit:contain;position:relative;z-index:1;
  filter:drop-shadow(0 4px 16px rgba(201,147,58,.22))}
.logo-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.6) 0%,transparent 45%,rgba(197,151,59,.04) 100%);
  pointer-events:none;z-index:2;
}

/* Micro-dots en esquinas */
.cdot{
  position:absolute;width:7px;height:7px;border-radius:50%;z-index:5;
  background:radial-gradient(circle,#F5D080,#C5973B);
  box-shadow:0 0 10px rgba(232,184,75,.9);
  animation:cdot 1.8s ease-in-out infinite;
}
.cdot:nth-child(1){top:-3.5px;left:-3.5px;animation-delay:0s}
.cdot:nth-child(2){top:-3.5px;right:-3.5px;animation-delay:.45s}
.cdot:nth-child(3){bottom:-3.5px;left:-3.5px;animation-delay:.9s}
.cdot:nth-child(4){bottom:-3.5px;right:-3.5px;animation-delay:1.35s}
@keyframes cdot{
  0%,100%{opacity:.35;transform:scale(1)}
  50%{opacity:1;transform:scale(1.6);box-shadow:0 0 16px rgba(232,184,75,1)}
}

/* TEXTO */
.brand{
  font-family:'Cormorant Garamond',serif;
  font-size:3.8rem;font-weight:600;
  letter-spacing:-.025em;line-height:1;
  background:linear-gradient(105deg,#C9933A 0%,#E8B84B 22%,#F5DFA8 45%,#C9933A 68%,#E8B84B 100%);
  background-size:250% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:brandIn .8s var(--out) .55s both, goldFlow 5s ease 2s infinite;
  opacity:0;
}
@keyframes brandIn{
  from{opacity:0;transform:translateY(24px);filter:blur(8px)}
  to{opacity:1;transform:translateY(0);filter:blur(0)}
}
@keyframes goldFlow{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

.tagline{
  font-size:.68rem;font-weight:500;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(201,147,58,.55);
  margin-top:.55rem;
  animation:fadeUp .6s var(--out) .78s both;opacity:0;
}
body.dark .tagline{color:rgba(201,147,58,.50)}

/* SEPARADOR */
.sep{
  width:0;height:1px;margin:2rem 0 1.8rem;
  background:linear-gradient(90deg,transparent,rgba(201,147,58,.65),rgba(245,223,168,.30),rgba(201,147,58,.45),transparent);
  animation:sepGrow .9s var(--out) 1s both;opacity:0;
}
@keyframes sepGrow{
  from{width:0;opacity:0}
  to{width:200px;opacity:1}
}

/* LOADER */
.loader{width:260px;animation:fadeUp .5s var(--out) 1.1s both;opacity:0}
.loader-top{display:flex;justify-content:space-between;margin-bottom:10px}
.loader-label,.loader-pct{
  font-size:.6rem;font-weight:600;letter-spacing:.13em;
  text-transform:uppercase;color:rgba(201,147,58,.50);
  transition:opacity .3s;
}
.hidden-txt{opacity:0}

.track{
  position:relative;width:100%;height:2.5px;
  background:rgba(201,147,58,.10);border-radius:99px;overflow:visible;
}
.fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--lila-dk),var(--lila),var(--gold),var(--gold-lt));
  background-size:300% 100%;
  width:0%;transition:width .5s cubic-bezier(.4,0,.2,1);
  animation:fillFlow 2.5s linear infinite;
  box-shadow:0 0 8px rgba(201,147,58,.45),0 0 20px rgba(196,168,224,.25);
}
@keyframes fillFlow{0%{background-position:0%}100%{background-position:300%}}
.fill::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle,#fff 30%,var(--gold-lt) 70%);
  box-shadow:0 0 8px #fff,0 0 16px rgba(201,147,58,.9);
  opacity:0;transition:opacity .3s ease;
}
.fill.lit::after{opacity:1}
.fill.indet{
  width:32%!important;transition:none;
  animation:indet 1.7s cubic-bezier(.4,0,.2,1) infinite,fillFlow 2s linear infinite;
}
@keyframes indet{
  0%{transform:translateX(-130%);opacity:0}
  8%{opacity:1}92%{opacity:1}
  100%{transform:translateX(460%);opacity:0}
}

.dots{display:flex;justify-content:center;gap:8px;margin-top:16px;transition:opacity .4s}
.dots.hidden-txt{opacity:0;pointer-events:none}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(201,147,58,.12);
  transition:all .4s var(--spring);
}
.dot.done{background:rgba(201,147,58,.45)}
.dot.live{
  background:var(--gold);transform:scale(1.7);
  box-shadow:0 0 8px rgba(201,147,58,.8);
  animation:dotPulse .85s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 8px rgba(201,147,58,.8)}
  50%{box-shadow:0 0 18px rgba(201,147,58,1),0 0 36px rgba(201,147,58,.35)}
}

/* VERSION */
.version{
  position:fixed;bottom:24px;right:26px;z-index:20;
  font-size:.58rem;font-weight:600;letter-spacing:.18em;
  color:rgba(201,147,58,.22);text-transform:uppercase;
  animation:fadeUp .6s ease 1.6s both;opacity:0;
}

/* EXIT */
body.exit{animation:exitAnim .55s cubic-bezier(.4,0,1,1) forwards}
@keyframes exitAnim{
  0%{opacity:1;filter:blur(0) brightness(1)}
  50%{opacity:.8;filter:blur(3px) brightness(1.15)}
  100%{opacity:0;filter:blur(12px) brightness(1.5)}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>
<div class="particles" id="pts"></div>

<div class="wrap">
  <div class="logo-scene">
    <div class="glow"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="pulse"></div>
    <div class="logo-box">
      <div class="cdot"></div><div class="cdot"></div>
      <div class="cdot"></div><div class="cdot"></div>
      <img src="logo.png" alt="Maneki"
           onerror="this.outerHTML='<span style=\'font-size:92px;filter:drop-shadow(0 4px 20px rgba(201,147,58,.4))\'>🐱</span>'">
    </div>
  </div>

  <h1 class="brand">Maneki Store</h1>
  <p class="tagline">Regalos Personalizados &thinsp;·&thinsp; Sistema de Gestión</p>

  <div class="sep"></div>

  <div class="loader">
    <div class="loader-top">
      <span class="loader-label hidden-txt" id="stepLabel">Iniciando...</span>
      <span class="loader-pct hidden-txt" id="pctLabel">0%</span>
    </div>
    <div class="track">
      <div class="fill indet" id="fill"></div>
    </div>
    <div class="dots hidden-txt" id="dots"></div>
  </div>
</div>

<div class="version">v1.0.0 &nbsp;·&nbsp; Maneki POS</div>

<script>
// ── TEMA: cargar preferencia guardada ANTES de renderizar ──
(function(){
  var dark=false;
  try{
    var s=localStorage.getItem('mk_dark');
    if(s!==null){dark=(s==='1');}
    else{dark=window.matchMedia('(prefers-color-scheme:dark)').matches;}
  }catch(e){}
  if(dark)document.body.classList.add('dark');
})();

// Partículas
const pEl=document.getElementById('pts');
const clrs=['rgba(201,147,58,OP)','rgba(232,184,75,OP)','rgba(196,168,224,OP)','rgba(155,123,196,OP)','rgba(245,223,168,OP)'];
for(let i=0;i<38;i++){
  const d=document.createElement('div');d.className='pt';
  const sz=Math.random()*4.5+1;
  const c=clrs[i%clrs.length].replace('OP',(Math.random()*.4+.08).toFixed(2));
  d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${c};filter:blur(${Math.random()<.35?0:1}px);
    --d:${(Math.random()*14+7).toFixed(1)}s;--dl:${(Math.random()*5).toFixed(1)}s;
    --op:${(Math.random()*.45+.06).toFixed(2)};
    --tx:${Math.round((Math.random()-.5)*90)}px;--ty:${Math.round((Math.random()-.5)*90)}px;
    --sc:${(Math.random()*.4+.8).toFixed(2)};`;
  pEl.appendChild(d);
}

// Dots de progreso
const TOTAL=6;
const LBLS=['Iniciando sistema...','Verificando integridad...','Cargando productos...','Cargando clientes...','Cargando historial...','Preparando interfaz...','¡Todo listo!'];
const dotsEl=document.getElementById('dots');
for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='d'+i;dotsEl.appendChild(d);}

let loaded=false;
function startLoad(){
  if(loaded)return;loaded=true;
  document.getElementById('fill').classList.remove('indet');
  ['stepLabel','pctLabel','dots'].forEach(id=>document.getElementById(id).classList.remove('hidden-txt'));
}

function setP(step,total,label){
  startLoad();
  const fill=document.getElementById('fill');
  const pct=Math.round(step/total*100);
  fill.style.width=pct+'%';
  if(pct>3)fill.classList.add('lit');
  document.getElementById('pctLabel').textContent=pct+'%';
  document.getElementById('stepLabel').textContent=label||LBLS[step]||'¡Listo!';
  for(let i=0;i<total;i++){
    const d=document.getElementById('d'+i);if(!d)continue;
    d.className='dot';
    if(i<step)d.classList.add('done');
    if(i===step)d.classList.add('live');
  }
}

function exit(cb){document.body.classList.add('exit');setTimeout(cb,520);}

// SEC-FIX: nodeIntegration desactivado — usar contextBridge (preload-splash.js)
if(window.splashAPI){
  window.splashAPI.onProgress(({step,total,label})=>setP(step,total||TOTAL,label));
  window.splashAPI.onExit(()=>exit(()=>window.splashAPI.exitDone()));
}else{
  // Fallback para desarrollo sin preload (jamás debería ocurrir en producción)
  let s=0;const t=setInterval(()=>{s++;setP(s,TOTAL,LBLS[s]);if(s>=TOTAL){clearInterval(t);setTimeout(()=>exit(()=>{}),700);}},680);
}
</script>
</body>
</html>
