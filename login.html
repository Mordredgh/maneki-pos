<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maneki Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── PALETA MANEKI PREMIUM ── */
  --cream:#FBF8F3;--gold:#C9933A;--gold-lt:#F5DFA8;--gold-bg:#FDF6E3;
  --ink:#2A1A0E;--ink2:#5C3D1E;--ink3:#9B7B5A;
  --lila:#C4A8E0;--lila-dk:#9B7BC4;
  /* surface light */
  --surface:rgba(255,255,255,.94);--surface-border:rgba(201,147,58,.20);
  --txt-primary:#2A1A0E;--txt-secondary:#5C3D1E;--txt-muted:rgba(155,123,90,.55);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --snap:cubic-bezier(0.22,1,0.36,1);
}

/* ── DARK MODE tokens ── */
body.dark{
  --surface:rgba(30,18,8,.90)!important;
  --surface-border:rgba(201,147,58,.22)!important;
  --txt-primary:#F5ECD6!important;
  --txt-secondary:#C9A87B!important;
  --txt-muted:rgba(201,168,123,.45)!important;
}

html,body{width:100%;min-height:100vh;overflow:hidden}
body{
  font-family:'Outfit',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  /* LIGHT: crema cálido con gradiente dorado/lila suave */
  background:
    radial-gradient(ellipse 700px 500px at 15% 20%,rgba(201,147,58,.07) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 80%,rgba(196,168,224,.08) 0%,transparent 55%),
    radial-gradient(ellipse 400px 300px at 60% 5%,rgba(245,223,168,.10) 0%,transparent 50%),
    linear-gradient(160deg,#FBF8F3 0%,#FDF6E3 35%,#F7F3FD 65%,#FBF8F3 100%);
  position:relative;
  transition:background .5s ease;
}
body.dark{
  /* DARK: tinta cálida oscura */
  background:
    radial-gradient(ellipse 700px 500px at 15% 20%,rgba(201,147,58,.07) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 80%,rgba(196,168,224,.05) 0%,transparent 55%),
    radial-gradient(ellipse 400px 300px at 60% 5%,rgba(201,147,58,.04) 0%,transparent 50%),
    linear-gradient(160deg,#1C120A 0%,#231709 35%,#1E1208 65%,#1C120A 100%)!important;
}

/* BG MESH */
.bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 15% 20%,rgba(201,147,58,.06) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 80%,rgba(196,168,224,.07) 0%,transparent 55%),
    radial-gradient(ellipse 400px 300px at 60% 5%,rgba(201,147,58,.04) 0%,transparent 50%);
}
body.dark .bg{
  background:
    radial-gradient(ellipse 700px 500px at 15% 20%,rgba(201,147,58,.09) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 80%,rgba(196,168,224,.06) 0%,transparent 55%),
    radial-gradient(ellipse 400px 300px at 60% 5%,rgba(201,147,58,.05) 0%,transparent 50%);
}

/* GRAIN */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
}

/* PARTÍCULAS FLOTANTES SUTILES */
.pt{
  position:fixed;border-radius:50%;pointer-events:none;z-index:2;
  opacity:0;animation:ptF var(--d) ease-in-out infinite var(--dl),ptS 1s var(--dl) ease forwards;
}
@keyframes ptF{0%,100%{transform:translate(0,0)}50%{transform:translate(var(--tx),var(--ty))}}
@keyframes ptS{to{opacity:var(--op)}}

/* CARD */
.card{
  position:relative;z-index:10;
  width:100%;max-width:390px;
  background:var(--surface);
  backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid var(--surface-border);
  border-radius:36px;
  padding:2.6rem 2.4rem 2.2rem;
  box-shadow:
    0 2px 0 rgba(255,255,255,.85) inset,
    0 -1px 0 rgba(201,147,58,.12) inset,
    0 60px 120px rgba(42,26,14,.10),
    0 24px 48px rgba(201,147,58,.08),
    0 8px 16px rgba(42,26,14,.05);
  animation:cardIn .75s var(--spring) both;
  text-align:center;
  transition:background .4s,border-color .4s,box-shadow .3s;
}
body.dark .card{
  box-shadow:
    0 2px 0 rgba(255,255,255,.04) inset,
    0 -1px 0 rgba(201,147,58,.15) inset,
    0 60px 140px rgba(0,0,0,.55),
    0 24px 60px rgba(201,147,58,.08),
    0 8px 20px rgba(0,0,0,.45);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(48px) scale(.92)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Card shake en error */
.card.err{animation:cardErr .5s cubic-bezier(.36,.07,.19,.97) both}
@keyframes cardErr{
  0%,100%{transform:translateX(0)}
  12%{transform:translateX(-12px) rotate(-.8deg)}
  25%{transform:translateX(10px) rotate(.7deg)}
  37%{transform:translateX(-8px) rotate(-.5deg)}
  50%{transform:translateX(7px) rotate(.4deg)}
  62%{transform:translateX(-5px)}
  75%{transform:translateX(4px)}
  87%{transform:translateX(-2px)}
}

/* LOGO */
.logo-wrap{
  position:relative;width:100px;height:100px;
  margin:0 auto 1.4rem;
  animation:logoIn .8s var(--spring) .1s both;
}
@keyframes logoIn{
  from{opacity:0;transform:scale(.4) rotate(-6deg)}
  to{opacity:1;transform:scale(1) rotate(0deg)}
}
.logo-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(var(--surface),var(--surface)) padding-box,
             conic-gradient(from 0deg,transparent 0%,rgba(201,147,58,.55) 15%,transparent 35%,rgba(196,168,224,.45) 65%,transparent 85%,rgba(201,147,58,.35) 100%) border-box;
  animation:spin 6s linear infinite;
}
body.dark .logo-ring{background:linear-gradient(rgba(30,18,8,.90),rgba(30,18,8,.90)) padding-box,
  conic-gradient(from 0deg,transparent 0%,rgba(232,184,75,.65) 15%,transparent 35%,rgba(196,168,224,.45) 65%,transparent 85%,rgba(232,184,75,.40) 100%) border-box;}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,147,58,.18) 0%,transparent 70%);
  filter:blur(10px);
  animation:glowB 3s ease-in-out infinite;
}
@keyframes glowB{0%,100%{opacity:.6}50%{opacity:1}}
.logo-box{
  width:100px;height:100px;border-radius:26px;
  background:linear-gradient(145deg,#fff,#FBF8F3);
  border:1px solid rgba(201,147,58,.22);
  box-shadow:
    0 12px 40px rgba(42,26,14,.12),
    0 4px 12px rgba(201,147,58,.12),
    inset 0 1.5px 0 #fff,
    inset 0 -1px 0 rgba(201,147,58,.1);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
body.dark .logo-box{background:linear-gradient(145deg,rgba(42,28,12,.95),rgba(30,18,8,.98));border-color:rgba(201,147,58,.28)}
.logo-box img{width:80%;height:80%;object-fit:contain;position:relative;z-index:1}
.logo-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);
  pointer-events:none;z-index:2;
}

/* TÍTULOS */
.store-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.9rem;font-weight:600;letter-spacing:-.01em;
  background:linear-gradient(115deg,#C9933A,#E8B84B,#F5DFA8,#C9933A);
  background-size:250% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.2rem;
  animation:fadeUp .5s var(--out) .3s both, goldFlow 5s ease 2s infinite;opacity:0;
}
@keyframes goldFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.store-sub{
  font-size:.72rem;font-weight:500;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink3);
  opacity:.75;margin-bottom:2rem;
  animation:fadeUp .5s var(--out) .42s both;
}

/* SEPARADOR FINO */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(197,151,59,.25),rgba(124,58,237,.15),transparent);
  margin-bottom:2rem;
}

/* PIN DOTS */
.pin-section{animation:fadeUp .5s var(--out) .5s both;opacity:0}
.pin-label{
  font-size:.65rem;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--txt-muted);
  margin-bottom:1.2rem;
}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:1.6rem}
.pin-dot{
  width:16px;height:16px;border-radius:50%;
  background:transparent;
  border:2px solid rgba(124,58,237,.2);
  transition:all .25s var(--spring);
  position:relative;
}
.pin-dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:transparent;transition:all .25s ease;
}
.pin-dot.filled{
  background:linear-gradient(135deg,#C9933A,#E8B84B);
  border-color:transparent;
  transform:scale(1.15);
  box-shadow:0 0 0 3px rgba(201,147,58,.15),0 4px 12px rgba(201,147,58,.45);
}
.pin-dot.error{
  background:linear-gradient(135deg,#EF4444,#DC2626);
  border-color:transparent;
  box-shadow:0 0 0 3px rgba(239,68,68,.15),0 4px 12px rgba(239,68,68,.4);
}
.pin-dot.success{
  background:linear-gradient(135deg,#10B981,#059669);
  border-color:transparent;
  box-shadow:0 0 0 3px rgba(16,185,129,.15),0 4px 12px rgba(16,185,129,.4);
  animation:successPop .4s var(--spring) both;
}
@keyframes successPop{0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1.2)}}

/* ESTADO VERIFICANDO */
.verifying{
  display:none;align-items:center;justify-content:center;gap:8px;
  font-size:.72rem;font-weight:600;color:var(--gold);
  min-height:1.4rem;margin-bottom:.6rem;
}
.verifying.on{display:flex}
.spin-ring{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(201,147,58,.25);
  border-top-color:#E8B84B;
  animation:spinR .65s linear infinite;
}
@keyframes spinR{to{transform:rotate(360deg)}}

/* ERROR MSG */
.err-msg{
  font-size:.75rem;font-weight:600;color:#EF4444;
  min-height:1.4rem;margin-bottom:.6rem;
  transition:opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.err-msg.hide{opacity:0;pointer-events:none}

/* NUMPAD */
.numpad-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:9px;margin-bottom:9px;
}
.numpad-bottom{
  display:grid;grid-template-columns:2fr 1fr;
  gap:9px;margin-bottom:1.2rem;
}
.key{
  background:rgba(253,248,243,.92);
  border:1px solid rgba(201,147,58,.14);
  border-radius:18px;
  padding:14px 10px;
  font-family:'Space Grotesk','Outfit',sans-serif;
  font-size:1.3rem;font-weight:600;
  color:var(--txt-primary);
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .12s var(--snap),background .12s,box-shadow .12s,border-color .15s;
  box-shadow:
    0 2px 0 rgba(255,255,255,.9) inset,
    0 1px 0 rgba(201,147,58,.08),
    0 4px 12px rgba(42,26,14,.06);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
body.dark .key{
  background:rgba(42,26,10,.85);border-color:rgba(201,147,58,.20);color:#F5ECD6;
  box-shadow:0 2px 0 rgba(255,255,255,.03) inset,0 4px 12px rgba(0,0,0,.35);
}
/* Shimmer interno del key al hover */
.key::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 60%);
  pointer-events:none;
}
.key:hover{
  transform:translateY(-2px);border-color:rgba(201,147,58,.30);
  box-shadow:0 2px 0 rgba(255,255,255,.9) inset,0 8px 24px rgba(201,147,58,.14),0 2px 8px rgba(42,26,14,.07);
}
body.dark .key:hover{
  border-color:rgba(201,147,58,.38);
  box-shadow:0 2px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(201,147,58,.18);
}
.key:active{
  transform:scale(.93) translateY(1px);
  box-shadow:0 1px 0 rgba(255,255,255,.8) inset,0 2px 6px rgba(42,26,14,.1);
}
/* Ripple en click */
.key .ripple{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(201,147,58,.22),transparent 70%);
  transform:scale(0);animation:ripple .4s ease forwards;
  pointer-events:none;
}
@keyframes ripple{to{transform:scale(4);opacity:0}}

.key.del-key{color:var(--lila-dk);font-size:1.1rem}
body.dark .key.del-key{color:var(--lila)}

/* FOOTER */
.card-footer{
  margin-top:1.4rem;padding-top:1.2rem;
  border-top:1px solid rgba(197,151,59,.1);
  font-size:.6rem;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:var(--txt-muted);
  animation:fadeUp .5s var(--out) .7s both;opacity:0;
}

/* DARK TOGGLE */
.dark-btn{
  position:fixed;top:20px;right:20px;z-index:100;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(201,147,58,.22);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--ink2);font-size:.88rem;
  transition:all .2s var(--spring);
  box-shadow:0 4px 12px rgba(42,26,14,.10);
}
body.dark .dark-btn{background:rgba(42,26,10,.75);border-color:rgba(201,147,58,.28);color:#E8B84B}
.dark-btn:hover{transform:scale(1.1) rotate(12deg);box-shadow:0 8px 20px rgba(201,147,58,.20)}

/* SUCCESS FLASH */
.card.success-flash{
  animation:successCard .5s ease forwards;
}
@keyframes successCard{
  0%{box-shadow:0 60px 120px rgba(42,26,14,.10),0 24px 48px rgba(201,147,58,.08)}
  50%{box-shadow:0 60px 120px rgba(16,185,129,.18),0 24px 48px rgba(16,185,129,.14)}
  100%{box-shadow:0 60px 120px rgba(16,185,129,.10),0 24px 48px rgba(16,185,129,.07)}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>

function key(el){var c=el.className||'';var m=c.match(/\bfa-([a-z0-9-]+)/g);if(!m)return null;for(var i=0;i<m.length;i++){var k=m[i];if(D[k])return k;}return null;}

function proc(el){if(el._mki)return;el._mki=1;var k=key(el);if(!k)return;el.innerHTML=svgFor(k);}

css();
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){scan();setTimeout(scan,200);setTimeout(scan,800);});}else{scan();setTimeout(scan,200);setTimeout(scan,800);}

<body>

<div class="bg"></div>
<div class="grain"></div>
<div id="ptWrap"></div>

<button class="dark-btn" id="darkBtn" onclick="toggleDark()" title="Cambiar tema">
  <i class="fas fa-moon" id="darkIco"></i>
</button>

<div class="card" id="loginCard">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-ring"></div>
    <div class="logo-box">
      <img src="logo.png" id="logoImg" alt="Maneki Store"
           onerror="this.parentElement.innerHTML='<span style=\'font-size:52px;filter:drop-shadow(0 2px 8px rgba(124,58,237,.35))\'>🐱</span>'">
    </div>
  </div>

  <h1 class="store-name" id="storeNameEl">Maneki Store</h1>
  <p class="store-sub" id="storeSloganEl">Regalos Personalizados</p>

  <div class="divider"></div>

  <!-- PIN -->
  <div class="pin-section">
    <p class="pin-label">Ingresa tu clave de acceso</p>

    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>

    <div class="verifying" id="verifyEl">
      <div class="spin-ring"></div> Verificando...
    </div>
    <div class="err-msg hide" id="errEl">
      <i class="fas fa-circle-exclamation"></i> Clave incorrecta
    </div>

    <!-- Numpad 1-9 -->
    <div class="numpad-grid">
      <button class="key" onclick="tap(this,'1')">1</button>
      <button class="key" onclick="tap(this,'2')">2</button>
      <button class="key" onclick="tap(this,'3')">3</button>
      <button class="key" onclick="tap(this,'4')">4</button>
      <button class="key" onclick="tap(this,'5')">5</button>
      <button class="key" onclick="tap(this,'6')">6</button>
      <button class="key" onclick="tap(this,'7')">7</button>
      <button class="key" onclick="tap(this,'8')">8</button>
      <button class="key" onclick="tap(this,'9')">9</button>
    </div>
    <!-- Fila inferior: 0 ancho completo + borrar -->
    <div class="numpad-bottom">
      <button class="key" onclick="tap(this,'0')">0</button>
      <button class="key del-key" onclick="tapDel(this)">
        <i class="fas fa-delete-left"></i>
      </button>
    </div>
  </div>

  <div class="card-footer" id="footerEl">Maneki Store &nbsp;·&nbsp; Sistema de Gestión</div>
</div>

<script>
// Partículas de fondo sutiles
const pw=document.getElementById('ptWrap');
for(let i=0;i<20;i++){
  const d=document.createElement('div');d.className='pt';
  const s=Math.random()*5+2;
  d.style.cssText=`
    position:fixed;border-radius:50%;pointer-events:none;z-index:2;
    width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:rgba(${Math.random()<.5?'124,58,237':'197,151,59'},${(Math.random()*.15+.05).toFixed(2)});
    filter:blur(${Math.random()<.4?0:2}px);
    --d:${(Math.random()*16+10).toFixed(1)}s;--dl:${(Math.random()*4).toFixed(1)}s;
    --op:${(Math.random()*.3+.05).toFixed(2)};
    --tx:${Math.round((Math.random()-.5)*60)}px;--ty:${Math.round((Math.random()-.5)*60)}px;
    opacity:0;animation:ptF var(--d) ease-in-out infinite var(--dl),ptS 1s var(--dl) ease forwards;`;
  pw.appendChild(d);
}
const sty=document.createElement('style');
sty.textContent=`@keyframes ptF{0%,100%{transform:translate(0,0)}50%{transform:translate(var(--tx),var(--ty))}}@keyframes ptS{to{opacity:var(--op)}}`;
document.head.appendChild(sty);

// ── PIN state ──
let pin='',busy=false,ipc=null;
try{ipc=require('electron').ipcRenderer}catch(e){}

// ── storeConfig ──
async function loadStoreConfig() {
  try {
    // 1. Intentar desde SQLite (Electron)
    if (ipc) {
      const result = await ipc.invoke('sqlite-load', { key: 'storeConfig' }).catch(() => null);
      if (result && result.ok && result.value) {
        const c = result.value;
        if (c.nombre || c.storeName) document.getElementById('storeNameEl').textContent = c.nombre || c.storeName;
        if (c.slogan || c.storeSlogan) document.getElementById('storeSloganEl').textContent = c.slogan || c.storeSlogan;
        if (c.logo || c.logoUrl) { const img = document.getElementById('logoImg'); if (img) img.src = c.logo || c.logoUrl; }
        return;
      }
    }
    // 2. Fallback: localStorage
    const raw = localStorage.getItem('storeConfig') || localStorage.getItem('maneki_storeConfig');
    if (raw) {
      const c = JSON.parse(raw);
      if (c.nombre || c.storeName) document.getElementById('storeNameEl').textContent = c.nombre || c.storeName;
      if (c.slogan || c.storeSlogan) document.getElementById('storeSloganEl').textContent = c.slogan || c.storeSlogan;
      if (c.logo || c.logoUrl) { const img = document.getElementById('logoImg'); if (img) img.src = c.logo || c.logoUrl; }
    }
  } catch(e) {}
}
loadStoreConfig();

// ── Dark mode — sincroniza con preferencia guardada en la app ──
function applyDark(v){
  document.body.classList.toggle('dark',v);
  document.getElementById('darkIco').className=v?'fas fa-sun':'fas fa-moon';
  try{localStorage.setItem('mk_dark',v?'1':'0')}catch(e){}
}
function toggleDark(){applyDark(!document.body.classList.contains('dark'))}

// Carga el tema: primero SQLite (Electron), luego localStorage, luego prefers-color-scheme
async function loadTheme(){
  // 1. Desde SQLite (Electron — fuente más confiable)
  if(typeof ipc !== 'undefined' && ipc){
    try{
      const r=await ipc.invoke('sqlite-load',{key:'mk_dark'}).catch(()=>null);
      if(r&&r.ok&&r.value!==undefined&&r.value!==null){
        applyDark(r.value==='1'||r.value===true||r.value===1);
        return;
      }
    }catch(e){}
  }
  // 2. Desde localStorage
  try{
    const s=localStorage.getItem('mk_dark');
    if(s!==null){applyDark(s==='1');return;}
  }catch(e){}
  // 3. Preferencia del sistema
  applyDark(window.matchMedia('(prefers-color-scheme:dark)').matches);
}
loadTheme();

// Ripple en botón
function addRipple(btn,e){
  const r=document.createElement('div');r.className='ripple';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*2;
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  btn.appendChild(r);setTimeout(()=>r.remove(),400);
}

function tap(btn,d){
  if(pin.length>=4||busy)return;
  addRipple(btn,{clientX:btn.getBoundingClientRect().left+btn.offsetWidth/2,clientY:btn.getBoundingClientRect().top+btn.offsetHeight/2});
  document.getElementById('errEl').classList.add('hide');
  pin+=d;updateDots();
  if(pin.length===4){busy=true;setTimeout(checkPin,160);}
}

function tapDel(btn){
  if(!pin.length||busy)return;
  addRipple(btn,{clientX:btn.getBoundingClientRect().left+btn.offsetWidth/2,clientY:btn.getBoundingClientRect().top+btn.offsetHeight/2});
  pin=pin.slice(0,-1);
  document.getElementById('errEl').classList.add('hide');
  updateDots();
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('dot'+i);
    d.classList.remove('filled','error','success');
    if(i<pin.length)d.classList.add('filled');
  }
}

function showError(){
  busy=false;
  document.getElementById('verifyEl').classList.remove('on');
  for(let i=0;i<4;i++)document.getElementById('dot'+i).className='pin-dot error';
  document.getElementById('errEl').classList.remove('hide');
  const card=document.getElementById('loginCard');
  card.classList.remove('err');void card.offsetWidth;card.classList.add('err');
  card.addEventListener('animationend',()=>card.classList.remove('err'),{once:true});
  setTimeout(()=>{pin='';updateDots();document.getElementById('errEl').classList.add('hide');},950);
}

function showSuccess(){
  for(let i=0;i<4;i++)setTimeout(()=>{
    const d=document.getElementById('dot'+i);d.classList.remove('filled');d.classList.add('success');
  },i*65);
  setTimeout(()=>document.getElementById('loginCard').classList.add('success-flash'),80);
  setTimeout(()=>{
    if(ipc)ipc.send('login-success');
    else window.location.href='index.html';
  },620);
}

async function checkPin(){
  document.getElementById('verifyEl').classList.add('on');
  try{
    let ok=ipc?await ipc.invoke('verify-pin',pin):false;
    document.getElementById('verifyEl').classList.remove('on');
    ok?showSuccess():showError();
  }catch(e){document.getElementById('verifyEl').classList.remove('on');showError();}
}

// Teclado físico
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(e.key>='0'&&e.key<='9'){
    e.preventDefault();
    const allKeys=document.querySelectorAll('.numpad-grid .key, .numpad-bottom .key');
    const btn=allKeys[parseInt(e.key)===0?9:parseInt(e.key)-1];
    if(btn)tap(btn,e.key);
  } else if(e.key==='Backspace'){
    e.preventDefault();
    const dbtn=document.querySelector('.del-key');if(dbtn)tapDel(dbtn);
  } else if(e.key==='Enter'&&pin.length===4&&!busy){
    e.preventDefault();
    busy=true;setTimeout(checkPin,80);
  }
});
</script>
