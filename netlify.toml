[build]
  publish = "."

# ── Optimización de assets ──────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ── Redirects ───────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers de seguridad para todo ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# ── HTML: siempre fresco (la app puede cambiar en cualquier deploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── JS/CSS locales: 1 día de cache (Netlify CDN sirve versión del deploy)
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Imágenes y fuentes: 30 días de cache
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
